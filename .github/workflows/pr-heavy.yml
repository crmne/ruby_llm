name: PR Heavy

on:
  pull_request:
    branches: ["main"]
    paths:
      - "lib/**"
      - "spec/**"
      - "gemfiles/**"
      - "Gemfile"
      - "Rakefile"
      - "Appraisals"
      - "ruby_llm.gemspec"
      - ".gitleaks.toml"
      - ".gitleaksignore"
      - ".github/workflows/_gitleaks.yml"
      - ".github/workflows/_lint.yml"
      - ".github/workflows/_test-matrix.yml"
      - ".github/workflows/pr-heavy.yml"

permissions:
  contents: read

concurrency:
  group: pr-heavy-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    uses: ./.github/workflows/_gitleaks.yml

  lint:
    uses: ./.github/workflows/_lint.yml
    with:
      ruby-version: "4.0"
      bundler-cache: false

  test:
    needs: [gitleaks, lint]
    uses: ./.github/workflows/_test-matrix.yml
    with:
      bundler-cache: false
    secrets: inherit
