        or an impossible truth.\n\n### **The Question:**\n**\"What will I ask you
        next?\"**\n\n### **Why It Works:**\n1. **Self-Referential Trap:** The mirror
        cannot truthfully answer this because your next question is unknown until
        you ask it. If it *could* answer truthfully, it would violate its own rule
