        **Nationality**: Japanese  \n- **Born**: April 14, 1965  \n\n### Background:\nYukihiro
        Matsumoto developed Ruby in **1993**. He was inspired by programming languages
        like Perl, Smalltalk, Eiffel, Lisp, and Python, aiming to create a language
        that was **more robust, object-oriented, and programmer-friendly**—particularly
        focusing on **developer productivity and happiness**.\n\n### Philosophy:\nMatz
        emphasizes that **\"programmer happiness\"** is a key goal of Ruby. He believes
