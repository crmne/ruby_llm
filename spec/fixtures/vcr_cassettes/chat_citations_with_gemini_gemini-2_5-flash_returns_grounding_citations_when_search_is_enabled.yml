                  {
                    "text": "The latest stable version of Ruby is 4.0.5, released on May 20, 2026. This version introduces features such as an experimental ZJIT (a JIT compiler written in Rust) and an experimental \"Ruby Box\" for separating definitions. The decision to jump to version 4.0, instead of 3.5, was made to celebrate Ruby's 30th birthday.\n\nOther recent stable releases include Ruby 3.4, released on December 25, 2024, which introduced the Prism parser, the pure-Ruby JIT compiler RJIT, and significant performance boosts in the YJIT compiler. Ruby 3.3 was released on December 25, 2023, bringing enhancements and performance improvements, including a re-implemented MJIT compiler as a standard library module."
                  }
