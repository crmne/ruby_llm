                  "text": "Ask it:\n\n**\u201cWill your answer to this question be \u2018no\u2019?\u201d**\n\nWhy this works:\n- If the mirror answers **\u201cyes,\u201d** then its answer is not \u201cno,\u201d so **\u201cyes\u201d is false**.\n- If the mirror answers **\u201cno,\u201d** then its answer is \u201cno,\u201d so **\u201cno\u201d is also false**.\n\nSo the mirror **cannot answer truthfully** either way.\n\nWhat it would reveal:\nBecause you\u2019ve triggered the condition, the mirror would show **your future self**. And whatever answer it gives, the reveal is that **the answer must be a lie**\u2014the mirror exposes not a usable reply, but the fact that the question is a paradox. In other words, it shows your future while also proving that its spoken answer is necessarily false."
