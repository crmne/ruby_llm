title: RubyLLM
description: One beautiful Ruby framework for all major AI providers. Chat, images, embeddings, tools.
url: https://rubyllm.com
baseurl: /
lang: en-US
locale: en_US
repository: crmne/ruby_llm
remote_theme: just-the-docs/just-the-docs

# Collections for organizing content
collections:
  getting_started:
    permalink: "/:name/"
    output: true
  core_features:
    permalink: "/:name/"
    output: true
  advanced:
    permalink: "/:name/"
    output: true
  reference:
    permalink: "/:name/"
    output: true

# Configure Just the Docs collections
just_the_docs:
  collections:
    getting_started:
      name: Getting Started
      nav_fold: false
    core_features:
      name: Core Features
      nav_fold: false
    advanced:
      name: Advanced
      nav_fold: false
    reference:
      name: Reference
      nav_fold: false

# Set default layout for collections
defaults:
  - scope:
      path: ""
      type: "getting_started"
    values:
      layout: "default"
      seo:
        type: "WebPage"
  - scope:
      path: ""
      type: "core_features"
    values:
      layout: "default"
      seo:
        type: "WebPage"
  - scope:
      path: ""
      type: "advanced"
    values:
      layout: "default"
      seo:
        type: "WebPage"
  - scope:
      path: ""
      type: "reference"
    values:
      layout: "default"
      seo:
        type: "WebPage"

logo: "/assets/images/logotype.svg"
favicon_ico: "/assets/images/logo.svg"

twitter:
  username: paolino
  card: summary_large_image

social:
  name: RubyLLM
  links:
    - https://github.com/crmne/ruby_llm
    - https://rubygems.org/gems/ruby_llm
    - https://github.com/sponsors/crmne

search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

nav_external_links:
  - title: GitHub
    url: https://github.com/crmne/ruby_llm
    hide_icon: false
  - title: Changelog
    url: https://github.com/crmne/ruby_llm/releases
    hide_icon: false
  - title: Blog
    url: https://paolino.me
    hide_icon: false

last_edit_timestamp: true

enable_copy_code_button: true

heading_anchors: true

# Base URL for raw markdown source files (used by "Copy page Markdown" button)
markdown_source_base_url: "https://raw.githubusercontent.com/crmne/ruby_llm/main/docs"

color_scheme: light

callouts:
  new:
    title: New
    color: green
  warning:
    title: Warning
    color: yellow
  note:
    title: Note
    color: blue

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-og-image
  - jekyll-redirect-from
  - jekyll-ai-visible-content

author:
  type: Organization
  name: RubyLLM
  url: https://rubyllm.com
  twitter: paolino

ai_visible_content:
  enabled: true
  entity:
    type: Organization
    id_slug: ruby-llm
    name: RubyLLM
    alternate_names:
      - ruby_llm
      - Ruby LLM
    description: one consistent Ruby framework for chat, image generation, embeddings, transcription, moderation, tools, agents, structured output, streaming, and Rails integration across OpenAI, Anthropic, Gemini, Bedrock, DeepSeek, Mistral, Ollama, OpenRouter, Perplexity, GPUStack, xAI, and OpenAI-compatible providers.
    image: /assets/images/logotype.svg
    same_as:
      - https://github.com/crmne/ruby_llm
      - https://rubygems.org/gems/ruby_llm
      - https://github.com/sponsors/crmne
    knows_about:
      - Ruby
      - Ruby on Rails
      - Large language models
      - AI agents
      - Retrieval augmented generation
      - Function calling
      - Structured output
      - Vector embeddings
      - Streaming AI responses
      - Multi-modal AI
      - OpenAI
      - Anthropic Claude
      - Google Gemini
      - AWS Bedrock
      - DeepSeek
      - Mistral AI
      - xAI
      - OpenRouter
      - Perplexity
      - Ollama
      - Vertex AI
      - GPUStack
      - OpenAI-compatible APIs
  json_ld:
    auto_inject: false
    include_website_schema: true
    include_breadcrumbs: true
    include_blog_posting: false
    include_faq: true
    include_how_to: true
    article_body: excerpt
    compact: true
  crawlers:
    allow_gptbot: true
    allow_perplexitybot: true
    allow_claudebot: true
    allow_googlebot: true
    allow_bingbot: true
    generate_robots_txt: true
  llms_txt:
    enabled: true
    title: RubyLLM Documentation
    description: Developer documentation for RubyLLM, a Ruby library for building AI applications with chat, agents, tools, embeddings, image generation, audio transcription, moderation, streaming, and Rails integration.
    include_full_text: true
    sections:
      - heading: Canonical Resources
        content: |
          - Documentation: https://rubyllm.com
          - Source code: https://github.com/crmne/ruby_llm
          - RubyGems package: https://rubygems.org/gems/ruby_llm
      - heading: Primary Topics
        content: |
          RubyLLM covers provider-agnostic AI application development in Ruby, including OpenAI, Anthropic, Gemini, Bedrock, DeepSeek, Mistral, Ollama, OpenRouter, Perplexity, GPUStack, xAI, OpenAI-compatible APIs, agents, tools, structured output, embeddings, image generation, audio transcription, moderation, streaming, Rails integration, async workloads, model registry usage, and upgrade guidance.
  linking:
    enable_entity_links: false
    apply_to_metadata: false
    enable_related_posts: false
  validation:
    warn_name_inconsistency: false
    warn_missing_same_as: true
    warn_missing_dates: false
    warn_orphan_pages: false
    warn_missing_descriptions: true
    fail_build_on_error: false
    content_only: true
    verbose: false
    max_examples: 5

# Jekyll uses Dart Sass; suppress deprecations emitted by upstream theme styles.
sass:
  quiet_deps: true
  silence_deprecations:
    - import
    - global-builtin
    - color-functions

og_image:
  output_dir: "assets/images/og"
  force: true
  collections:
    - pages
    - getting_started
    - core_features
    - advanced
    - reference
  image:
    path: "assets/images/logotype.svg"
    width: 290
    height: 100
  domain: "rubyllm.com"
  header:
    prefix: "RubyLLM Docs: "
    font_family: "Plus Jakarta Sans, bold"
  content:
    font_family: "Inter, regular"
  metadata:
    fields:
      - description
  border_bottom:
    width: 20
    fill:
      - "#820C02"
      - "#A91401"
      - "#D51F06"
      - "#DE3F24"
      - "#EDA895"

# Model variables for documentation
# These are used throughout the docs to ensure consistency
# and make it easy to update model names in one place
models:
  # Default models for basic examples
  default_chat: "gpt-5-nano"
  default_embedding: "text-embedding-3-small"
  default_image: "gpt-image-1.5"

  # OpenAI models
  openai_latest: "gpt-5.4"
  openai_current: "gpt-5-nano"
  openai_vision: "gpt-5.4"
  openai_tools: "gpt-5.4"
  openai_mini: "gpt-5-mini"
  openai_audio: "gpt-4o-audio-preview"
  openai_legacy: "gpt-3.5-turbo" # schema unsupported
  openai_standard: "gpt-5.4"

  # Anthropic models
  anthropic_latest: "claude-sonnet-4-6"
  anthropic_current: "claude-sonnet-4-6"
  anthropic_newest: "claude-sonnet-4-6"
  anthropic_opus: "claude-opus-4-6"

  # Google models
  gemini_latest: "gemini-3.1-pro-preview"
  gemini_current: "gemini-3.1-pro-preview"
  gemini_current_latest: "gemini-3.1-pro-preview"

  # Embedding models
  embedding_small: "text-embedding-3-small"
  embedding_large: "text-embedding-3-large"
  embedding_google: "text-embedding-004"

  # Image generation models
  image_openai: "gpt-image-1.5"
  image_dalle: "dall-e-3"
  image_google: "imagen-3.0-generate-002"

  # Local/Other models
  local_llama: "llama-3"

  # Model categories for different use cases
  best_for_code: "gpt-5.4"
  best_for_creative: "claude-opus-4-6"
  best_for_factual: "gemini-3.1-pro-preview"
  best_for_vision: "gpt-5.4"
  best_for_audio: "gpt-4o-audio-preview"
  best_for_tools: "gpt-5.4"
  best_for_budget: "gemini-3-flash-preview"
